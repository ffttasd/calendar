<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能日历</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="h-screen flex flex-col bg-white overflow-hidden">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 bg-white" style="border-bottom: 1px solid #e2e8f0; min-height: 64px;">
            <!-- 左侧：Logo + 导航 -->
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <button id="prevBtn" class="h-8 w-8 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button id="nextBtn" class="h-8 w-8 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
                <button id="todayBtn" class="h-9 px-4 rounded-md text-sm font-medium hover:bg-gray-100 transition-colors text-gray-700">
                    今天
                </button>
                
                <!-- 标题 -->
                <div id="viewTitle" class="text-xl font-normal text-gray-900" style="min-width: 180px;">
                    2024年 2月
                </div>
            </div>

            <!-- 右侧：视图切换和添加按钮 -->
            <div class="flex items-center gap-6">
                <!-- 视图切换 -->
                <div class="flex items-center gap-2">
                    <button id="monthViewBtn" class="view-btn px-4 py-2 rounded-md text-sm font-medium transition-all">月</button>
                    <button id="weekViewBtn" class="view-btn active px-4 py-2 rounded-md text-sm font-medium transition-all">周</button>
                    <button id="dayViewBtn" class="view-btn px-4 py-2 rounded-md text-sm font-medium transition-all">日</button>
                </div>

                <!-- 添加按钮 -->
                <button id="addEventBtn" class="h-10 px-6 rounded-md bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium flex items-center gap-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新建
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Main Content -->
            <main class="flex-1 overflow-hidden">
                <!-- 月视图 -->
                <div id="monthView" class="calendar-view flex flex-col h-full">
                    <!-- 星期标题 -->
                    <div class="grid grid-cols-7 border-b border-gray-200">
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周一</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周二</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周三</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周四</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周五</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周六</div>
                        <div class="py-3 text-center text-sm font-medium text-gray-500">周日</div>
                    </div>
                    <!-- 日历网格 -->
                    <div id="monthGrid" class="flex-1 overflow-y-auto">
                        <!-- 月视图网格将由JS生成 -->
                    </div>
                </div>

                <!-- 周视图 -->
                <div id="weekView" class="calendar-view active flex flex-col h-full">
                    <!-- 周视图内容将由JS生成 -->
                </div>

                <!-- 日视图 -->
                <div id="dayView" class="calendar-view flex flex-col h-full">
                    <!-- 日视图内容将由JS生成 -->
                </div>
            </main>

            <!-- Sidebar -->
            <aside class="w-80 border-l border-gray-200 bg-gray-50/50 flex flex-col overflow-y-auto" style="backdrop-filter: blur(8px);">
                <!-- TODO 区域 -->
                <div id="todoSection" class="p-5 border-b border-gray-200">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-bold text-gray-700" style="letter-spacing: 0.5px;">任务管理</h3>
                        <div class="flex items-center gap-2">
                            <button id="toggleHistoryBtn" class="text-xs px-2 py-1 rounded hover:bg-gray-200 transition-colors text-gray-600" title="历史记录">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </button>
                            <button id="toggleTodoViewBtn" class="text-xs px-2 py-1 rounded hover:bg-gray-200 transition-colors text-gray-600" title="切换视图">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 简洁模式 TODO -->
                    <div id="simpleTodoView" class="hidden">
                        <!-- TODO列表视图 -->
                        <div id="simpleTodoContainer" class="bg-white rounded-lg p-3 shadow-sm cursor-pointer hover:shadow-md transition-all" style="min-height: 200px;">
                            <div id="simpleTodoList" class="space-y-2 mb-3"></div>
                            <div class="simple-todo-add-area">点击添加任务</div>
                        </div>
                        
                        <!-- 历史记录视图 -->
                        <div id="simpleHistoryContainer" class="bg-white rounded-lg p-3 shadow-sm hidden" style="min-height: 200px;">
                            <div class="history-list" id="todoHistoryList"></div>
                        </div>
                    </div>
                    
                    <!-- 四象限模式 -->
                    <div id="quadrantTodoView" class="hidden">
                        <!-- TODO列表视图 -->
                        <div id="quadrantTodoContainer">
                            <!-- 四个象限 2x2 布局 -->
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <!-- 第二象限：重要但不紧急（左上）-->
                                <div class="quadrant-box" data-quadrant="2" style="background: linear-gradient(135deg, rgba(45, 95, 79, 0.08) 0%, rgba(255, 255, 255, 0.95) 50%);">
                                    <div class="quadrant-header">
                                        <div class="quadrant-title">重要不急</div>
                                    </div>
                                    <div class="todo-list" id="todoList2"></div>
                                </div>
                                
                                <!-- 第一象限：重要且紧急（右上）-->
                                <div class="quadrant-box" data-quadrant="1" style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.08) 0%, rgba(255, 255, 255, 0.95) 50%);">
                                    <div class="quadrant-header">
                                        <div class="quadrant-title">重要紧急</div>
                                    </div>
                                    <div class="todo-list" id="todoList1"></div>
                                </div>
                                
                                <!-- 第四象限：不重要且不紧急（左下）-->
                                <div class="quadrant-box" data-quadrant="4" style="background: linear-gradient(135deg, rgba(156, 163, 175, 0.08) 0%, rgba(255, 255, 255, 0.95) 50%);">
                                    <div class="quadrant-header">
                                        <div class="quadrant-title">不重要不急</div>
                                    </div>
                                    <div class="todo-list" id="todoList4"></div>
                                </div>
                                
                                <!-- 第三象限：不重要但紧急（右下）-->
                                <div class="quadrant-box" data-quadrant="3" style="background: linear-gradient(135deg, rgba(251, 146, 60, 0.08) 0%, rgba(255, 255, 255, 0.95) 50%);">
                                    <div class="quadrant-header">
                                        <div class="quadrant-title">不重要急</div>
                                    </div>
                                    <div class="todo-list" id="todoList3"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 历史记录视图 -->
                        <div id="quadrantHistoryContainer" class="hidden">
                            <div class="history-box-inline">
                                <div class="history-list" id="todoHistoryListQuadrant"></div>
                            </div>
                        </div>
                        
                        <!-- 第二行：日历和快速创建 -->
                        <div class="grid grid-cols-2 gap-4">
                            <!-- 小日历 -->
                            <div>
                                <div id="miniCalendarQuadrant" class="bg-white rounded-xl p-4 shadow-sm" style="box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);">
                                    <!-- 小日历内容将由JS生成 -->
                                </div>
                            </div>
                            
                            <!-- 快速创建 -->
                            <div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="duration-card" data-duration="15" draggable="true">
                                        <div class="duration-number">15</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                    <div class="duration-card" data-duration="30" draggable="true">
                                        <div class="duration-number">30</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                    <div class="duration-card" data-duration="45" draggable="true">
                                        <div class="duration-number">45</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                    <div class="duration-card" data-duration="60" draggable="true">
                                        <div class="duration-number">60</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                    <div class="duration-card" data-duration="120" draggable="true">
                                        <div class="duration-number">120</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                    <div class="duration-card" data-duration="180" draggable="true">
                                        <div class="duration-number">180</div>
                                        <div class="duration-label">分钟</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
                
                <!-- 小日历 -->
                <div id="miniCalendarSection" class="p-5 border-b border-gray-200">
                    <div id="miniCalendar" class="bg-white rounded-xl p-5 shadow-sm" style="box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);">
                        <!-- 小日历内容将由JS生成 -->
                    </div>
                </div>
                
                <!-- 时间卡片 -->
                <div id="durationCardsSection" class="p-5 border-b border-gray-200">
                    <h3 class="text-sm font-bold text-gray-700 mb-4" style="letter-spacing: 0.5px;">快速创建</h3>
                    <div class="grid grid-cols-3 gap-2.5">
                        <div class="duration-card" data-duration="15" draggable="true">
                            <div class="duration-number">15</div>
                            <div class="duration-label">分钟</div>
                        </div>
                        <div class="duration-card" data-duration="30" draggable="true">
                            <div class="duration-number">30</div>
                            <div class="duration-label">分钟</div>
                        </div>
                        <div class="duration-card" data-duration="45" draggable="true">
                            <div class="duration-number">45</div>
                            <div class="duration-label">分钟</div>
                        </div>
                        <div class="duration-card" data-duration="60" draggable="true">
                            <div class="duration-number">60</div>
                            <div class="duration-label">分钟</div>
                        </div>
                        <div class="duration-card" data-duration="120" draggable="true">
                            <div class="duration-number">120</div>
                            <div class="duration-label">分钟</div>
                        </div>
                        <div class="duration-card" data-duration="180" draggable="true">
                            <div class="duration-number">180</div>
                            <div class="duration-label">分钟</div>
                        </div>
                    </div>
                </div>
                
                <!-- 设置 -->
                <div class="p-5 flex justify-center">
                    <div class="relative w-full max-w-xs">
                        <button id="settingsBtn" class="w-full flex items-center justify-between px-4 py-3 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 hover:border-gray-300 transition-all shadow-sm">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                <span class="text-sm font-semibold text-gray-700">设置</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-400 transition-transform" id="settingsChevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        
                        <!-- 设置菜单 -->
                        <div id="settingsMenu" class="hidden absolute bottom-full left-0 right-0 mb-2 bg-white border border-gray-200 rounded-lg shadow-xl overflow-hidden z-50">
                            <button id="exportDataBtn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-100">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                                <div>
                                    <div class="text-sm font-medium text-gray-700">导出数据</div>
                                    <div class="text-xs text-gray-500">下载所有日程和任务</div>
                                </div>
                            </button>
                            <button id="importDataBtn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-100">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L9 8m4-4v12"></path>
                                </svg>
                                <div>
                                    <div class="text-sm font-medium text-gray-700">导入数据</div>
                                    <div class="text-xs text-gray-500">从文件恢复数据</div>
                                </div>
                            </button>
                            <button id="viewBackupsBtn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-100">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                </svg>
                                <div>
                                    <div class="text-sm font-medium text-gray-700">查看备份数据</div>
                                    <div class="text-xs text-gray-500">管理历史备份</div>
                                </div>
                            </button>
                            <button id="backupSettingsBtn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left border-b border-gray-100">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                                </svg>
                                <div>
                                    <div class="text-sm font-medium text-gray-700">备份设置</div>
                                    <div class="text-xs text-gray-500">自动备份近7天数据</div>
                                </div>
                            </button>
                            <button id="testAudioBtn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left">
                                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 14.142M6.343 6.343L4.93 4.93m1.414 1.414L4.93 7.757m0 8.486l1.414-1.414M7.757 4.93L6.343 6.343m8.486 8.486l1.414 1.414m-1.414-1.414L16.243 4.93"></path>
                                </svg>
                                <div>
                                    <div class="text-sm font-medium text-gray-700">测试音频</div>
                                    <div class="text-xs text-gray-500">测试专注模式提示音</div>
                                </div>
                            </button>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Event Detail Popup -->
    <div id="eventDetailPopup" class="event-detail-popup hidden">
        <div class="event-detail-content">
            <!-- 顶部操作栏 -->
            <div class="event-detail-header">
                <button id="copyEventDetailBtn" class="icon-btn" title="复制 (Ctrl+C)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <button id="editEventDetailBtn" class="icon-btn" title="编辑">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </button>
                <button id="deleteEventDetailBtn" class="icon-btn" title="删除">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </button>
                <button id="closeEventDetailBtn" class="icon-btn" title="关闭">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 事件信息 -->
            <div class="event-detail-body">
                <!-- 标题和颜色 -->
                <div class="flex items-start gap-3 mb-4">
                    <div id="eventDetailColor" class="w-4 h-4 rounded-full mt-1 flex-shrink-0"></div>
                    <h3 id="eventDetailTitle" class="text-xl font-semibold text-gray-900 flex-1"></h3>
                </div>

                <!-- 时间 -->
                <div class="flex items-start gap-3 mb-3">
                    <svg class="w-5 h-5 text-gray-500 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12,6 12,12 16,14"></polyline>
                    </svg>
                    <div class="flex-1">
                        <div id="eventDetailDate" class="text-gray-700"></div>
                        <div id="eventDetailTime" class="text-gray-600 text-sm"></div>
                    </div>
                </div>

                <!-- 地点 -->
                <div id="eventDetailLocationContainer" class="flex items-start gap-3 mb-3 hidden">
                    <svg class="w-5 h-5 text-gray-500 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <div id="eventDetailLocation" class="flex-1 text-gray-700"></div>
                </div>

                <!-- 描述 -->
                <div id="eventDetailDescriptionContainer" class="flex items-start gap-3 hidden">
                    <svg class="w-5 h-5 text-gray-500 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="15" y2="18"></line>
                    </svg>
                    <div id="eventDetailDescription" class="flex-1 text-gray-700 whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div id="modalContainer" class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 max-h-90vh overflow-y-auto">
            <div class="px-6 pt-6 pb-4 border-b border-gray-100">
                <h2 id="modalTitle" class="text-xl font-semibold flex items-center gap-2">
                    <div id="modalColorDot" class="w-3 h-3 rounded-full bg-blue-500"></div>
                    新建日程
                </h2>
            </div>

            <div class="px-6 py-4 space-y-5">
                <!-- 标题 -->
                <div class="space-y-2">
                    <label for="eventTitle" class="text-sm font-medium text-gray-700">标题</label>
                    <input id="eventTitle" type="text" placeholder="输入日程标题" class="w-full h-11 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- 日期和时间 -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12,6 12,12 16,14"></polyline>
                        </svg>
                        时间
                    </label>
                    <div class="flex items-center gap-3">
                        <input id="eventDate" type="date" class="h-11 flex-1 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <input id="eventStartTime" type="time" class="h-11 w-28 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="text-gray-400">至</span>
                        <input id="eventEndTime" type="time" class="h-11 w-28 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <!-- 快速时长选择 -->
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs text-gray-500">快速时长:</span>
                        <button type="button" class="quick-duration-btn" data-duration="15">15分</button>
                        <button type="button" class="quick-duration-btn" data-duration="30">30分</button>
                        <button type="button" class="quick-duration-btn" data-duration="45">45分</button>
                        <button type="button" class="quick-duration-btn" data-duration="60">1时</button>
                        <button type="button" class="quick-duration-btn" data-duration="120">2时</button>
                        <button type="button" class="quick-duration-btn" data-duration="180">3时</button>
                    </div>
                </div>

                <!-- 地点（可折叠） -->
                <div class="space-y-2">
                    <button type="button" id="toggleLocationBtn" class="w-full flex items-center justify-between text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors bg-transparent hover:bg-transparent">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            地点
                        </div>
                        <svg id="locationChevron" class="w-4 h-4 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="locationField" class="hidden">
                        <input id="eventLocation" type="text" placeholder="添加地点" class="w-full h-11 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- 描述（可折叠） -->
                <div class="space-y-2">
                    <button type="button" id="toggleDescriptionBtn" class="w-full flex items-center justify-between text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors bg-transparent hover:bg-transparent">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <line x1="3" y1="6" x2="21" y2="6"></line>
                                <line x1="3" y1="12" x2="21" y2="12"></line>
                                <line x1="3" y1="18" x2="15" y2="18"></line>
                            </svg>
                            描述
                        </div>
                        <svg id="descriptionChevron" class="w-4 h-4 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="descriptionField" class="hidden">
                        <textarea id="eventDescription" placeholder="添加描述" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" style="font-family: inherit;"></textarea>
                    </div>
                </div>

                <!-- 颜色 -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                            <line x1="7" y1="7" x2="7.01" y2="7"></line>
                        </svg>
                        标签颜色
                    </label>
                    <div id="colorPicker" class="flex items-center gap-2 flex-wrap">
                        <!-- 颜色选择器将由JS生成 -->
                    </div>
                </div>

                <!-- 随机提示音 -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between p-4 bg-gradient-to-r from-gray-50 to-gray-100 rounded-xl border border-gray-200 hover:border-gray-300 transition-all">
                        <div class="flex items-center gap-3 flex-1">
                            <button type="button" id="focusAlertToggle" class="focus-alert-toggle" data-enabled="false">
                                <svg class="focus-alert-icon-bell" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                                </svg>
                                <svg class="focus-alert-icon-mute hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>
                                </svg>
                            </button>
                            <div class="flex-1">
                                <div class="text-sm font-semibold text-gray-900">专注提示音</div>
                                <div class="text-xs text-gray-600 mt-0.5">每3-5分钟随机提醒休息</div>
                            </div>
                        </div>
                    </div>
                    <input type="checkbox" id="focusAlertCheckbox" class="hidden">
                </div>
            </div>

            <div class="px-6 py-4 border-t border-gray-100 flex justify-between">
                <button id="deleteEventBtn" class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors hidden">删除</button>
                <div class="flex gap-2">
                    <button id="cancelEventBtn" class="px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">取消</button>
                    <button id="saveEventBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2">
        <!-- Toast messages will be added here -->
    </div>

    <!-- Focus Rest Alert -->
    <div id="focusRestAlert" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden" style="backdrop-filter: blur(4px);">
        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center" style="max-width: 400px; animation: fadeInScale 0.3s ease-out;">
            <div class="text-6xl mb-4">💡</div>
            <div class="text-2xl font-bold text-gray-900 mb-2">休息 10 秒</div>
            <div class="text-lg text-gray-600 mb-4">闭眼放松，深呼吸</div>
            <div id="restCountdown" class="text-5xl font-bold text-blue-500">10</div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirmDialog" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden" style="z-index: 9999;">
        <div class="bg-white rounded-2xl shadow-2xl mx-4 overflow-hidden" style="backdrop-filter: blur(12px); width: 480px;">
            <!-- 顶部装饰条 -->
            <div class="h-1.5 bg-gradient-to-r from-red-400 via-red-500 to-red-600"></div>
            
            <div class="p-8">
                <!-- 标题和消息 -->
                <div class="text-center mb-8">
                    <h3 id="confirmTitle" class="text-2xl font-bold text-gray-900 mb-4">删除日程</h3>
                    <p id="confirmMessage" class="text-lg text-gray-600 leading-relaxed">确定要删除这个日程吗？此操作无法撤销</p>
                </div>
                
                <!-- 按钮组 -->
                <div class="flex gap-4">
                    <button id="confirmCancelBtn" class="flex-1 px-6 py-3.5 border-2 border-gray-200 rounded-xl hover:bg-gray-50 hover:border-gray-300 transition-all text-gray-700 font-semibold shadow-sm text-base">
                        取消
                    </button>
                    <button id="confirmOkBtn" class="flex-1 px-6 py-3.5 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl hover:from-red-600 hover:to-red-700 transition-all font-semibold shadow-lg shadow-red-500/30 text-base">
                        确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importFileInput" accept=".json" style="display: none;">

    <!-- 备份管理模态框 -->
    <div id="backupsModal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 max-h-90vh overflow-hidden">
            <!-- 头部 -->
            <div class="px-6 py-5 border-b border-gray-200 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-gray-900">备份管理</h2>
                        <p class="text-sm text-gray-500">查看和管理历史备份数据</p>
                    </div>
                </div>
                <button id="closeBackupsModalBtn" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- 备份列表 -->
            <div id="backupsListContainer" class="px-6 py-4 overflow-y-auto" style="max-height: 60vh;">
                <!-- 备份列表将由 JS 生成 -->
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
